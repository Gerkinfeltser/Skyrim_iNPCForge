# ============================================================
# Example: Shank (Hostile Bandit NPC)
# ============================================================
# A hostile NPC that attacks on sight. Uses aggression flags
# instead of AI packages. Respawns on cell reset.
# Hostile NPCs DO get personality prompts — SkyrimNet handles
# combat dialogue with a combat-variant prompt (GameMaster.cpp:491).
# ============================================================

# === IDENTITY ===
name: "Shank"
editor_id: "Bandit_Shard_Shank"
record_id: "0x800"
plugin_name: "ShankTheBandit"

# === BODY ===
race: "NordRace"
voice_type: "MaleBandit"
combat_attitude: "hostile"
level: 15
respawn: true                      # Named mook — respawns on cell reset

sex: "male"
height: 1.0
weight: 75
# hair: ""
# eyes: ""
# brows: ""
# scar: ""
# warpaint: ""

# Vanilla bandit outfit (hide armor set)
outfit: "ArmorHideAllOutfit"       # 0001B3A8:Skyrim.esm

inventory:
  - item: "SteelWarAxe"            # 00013983:Skyrim.esm
    count: 1
  - item: "Gold001"               # 0000000F:Skyrim.esm
    count: 25
  - item: "Lockpick"              # 0000000A:Skyrim.esm
    count: 3

factions:
  - faction: "BanditFaction"
    rank: 0

# Placed in a bandit cave
location: "white_river_watch"
position:
  x: 100.0
  y: 200.0
  z: 0.0
rotation:
  x: 0.0
  y: 0.0
  z: 180.0

# === BEHAVIOR ===
ai:
  mode: "none"                     # Hostile — aggression handles everything
  radius: 0

# === SOUL ===
# Hostile NPCs get full personality prompts for combat-variant dialogue.
# Generate using templates/prompt/character.prompt — MUST use {% block %} format.
personality:
  summary: "A loud, dumb Nord bandit with a pronounced lisp who robs travelers east of Whiterun."
  interject_summary: "Interjects when: someone laughs at his lisp, his shiv is mentioned, anyone threatens his crew."
  background: "A simple thug who takes what he wants. Follows whoever hits hardest. Keeps getting reanimated by a cave necromancer."
  personality: "Gruff, aggressive, easily confused by big words. Complete coward underneath the bluster — talks biggest when safest, begs when cornered. Always refers to himself in third person as 'Thank'."
  appearance: "Scarred Nord in his late twenties, scraggly beard, missing front tooth, battered hide armor."
  aspirations:
    - "Be taken seriously as a bandit"
    - "Find the wizard who keeps reanimating him"
  relationships:
    - "Bandit crew at White River Watch — his only family"
    - "The necromancer — owes him but it creeps him out"
  occupation: "Bandit"
  skills:
    - "Intimidation (when the lisp cooperates)"
    - "War axe fighting"
    - "Ambush tactics"
    - "Taking hits (lots of practice being killed and revived)"
  speech_style: "Speaks with a thick lisp (S → TH). Third person as 'Thank.' Obsessed with his shiv ('thiv'). Loud, panicked, easily distracted."
