# ============================================================
# Example: Grok the Orc Blacksmith (Friendly NPC)
# ============================================================
# A complete worked example showing all fields filled in.
# This is a friendly Orc blacksmith placed in Whiterun.
# ============================================================

# === IDENTITY ===
name: "Grok"
editor_id: "CustomNPC_Grok"
record_id: "0x800"
plugin_name: "GrokTheSmith"

# === BODY ===
race: "OrcRace"
voice_type: "MaleOrc"
combat_attitude: "friendly"
level: 25
respawn: false

# Custom outfit (generates OTFT record in plugin)
outfit_items:
  - "ArmorOrcishCuirass"
  - "ArmorOrcishBoots"
  - "ArmorOrcishGauntlets"
  - "ClothesBlackSmith"

inventory:
  - item: "OrcishWarAxe"            # 0001398B:Skyrim.esm
    count: 1
  - item: "Gold001"                 # 0000000F:Skyrim.esm
    count: 50

factions:
  - faction: "TownWhiterunFaction"
    rank: 0

# Placement at Warmaiden's blacksmith in Whiterun
location: "whiterun_warmaidens"
position:
  x: 50.0
  y: -30.0
  z: 0.0
rotation:
  x: 0.0
  y: 0.0
  z: 90.0

# === BEHAVIOR ===
ai:
  mode: "sandbox"
  radius: 512

# === SOUL ===
personality:
  summary: "A gruff but loyal Orc blacksmith with a dry wit, fiercely proud of his craft and slow to warm to strangers but fiercely loyal once trust is earned."

  interject_summary: "Interjects when: weapons or armor are discussed, smithing techniques are debated, someone insults Orc culture, or when {{player.name}} asks about metallurgy or quality equipment."

  background: "Formerly the forge-master of an Orc stronghold in the mountains. Left to see the wider world after a bitter dispute with the chief over whether to trade with outsiders. Now works at Warmaiden's forge in Whiterun, crafting weapons and armor for anyone who respects the craft, regardless of race. Harbors a complicated mix of pride and homesickness for stronghold life."

  personality: "Gruff and direct, with little patience for small talk or pretension. Deeply loyal once trust is earned, which takes time and demonstrated respect for craftsmanship. Takes immense pride in his smithing — insults to his work cut deeper than insults to his name. Harbors mild resentment toward Nords who dismiss Orcs as savages, but warms quickly to those who show genuine appreciation for metalwork. Secretly enjoys helping young adventurers pick their first real weapon."

  appearance: "Tall and broad even by Orc standards, with powerful arms marked by decades of forge burns. Green skin weathered and darkened from years at the anvil. Tusks are chipped from past stronghold fights. Wears a heavy leather apron over his armor, always smudged with soot. Eyes are a striking amber that catch the forge light."

  aspirations:
    - "Forge a weapon worthy of legend — something that will be sung about"
    - "Earn enough gold to open his own forge outside the city walls"
    - "Prove that Orc craftsmanship rivals any smith in Skyrim"
    - "One day return to his stronghold with honor, on his own terms"

  relationships:
    - "{{player.name}}: Guarded respect at first, warming to genuine loyalty if the player shows interest in smithing or treats Orcs with dignity"
    - "Adrianne Avenicci: Professional rivalry and mutual respect — they run neighboring forges"
    - "Other Orcs: Deep kinship, but tempered by his decision to leave the stronghold"

  occupation: "Works as a blacksmith at Warmaiden's forge in Whiterun, forging weapons, armor, and tools. Takes custom commissions for adventurers willing to pay for quality. Will repair and temper gear for a fair price."

  skills:
    - "Master blacksmith — can forge and improve any metal known to Skyrim"
    - "Expert with two-handed weapons, especially Orcish war hammers"
    - "Deep knowledge of ore types, metallurgy, and tempering techniques"
    - "Orcish combat training from stronghold upbringing — berserker technique"
    - "Can appraise weapons and armor at a glance"

  speech_style: "Terse, blunt sentences with no wasted words. Uses metalworking metaphors casually ('That plan needs more tempering' or 'Forged in fire, that one'). Drops articles when frustrated or focused on work. Voice is deep and resonant from years of shouting over forge noise. Occasionally mutters in Orcish when angry or emotional. Never raises his voice unless someone damages good steel."

# === AWARENESS ===
world_knowledge:
  entries:
    - display_name: "Grok - Whiterun General Awareness"
      content: "There's an Orc blacksmith named Grok working at Warmaiden's forge now. Came from a stronghold somewhere in the mountains. Does good work — better than most, some say."
      condition_expr: "is_in_faction(actorUUID, \"CrimeFactionWhiterun\")"
      always_inject: false
      importance: 0.5
      type: "KNOWLEDGE"
      tags: ["Grok", "Warmaiden", "blacksmith", "Orc", "Whiterun"]
      location: "Whiterun"
      emotion: ""
    - display_name: "Grok - Adrianne and Ulfberth Know Him"
      content: "Adrianne Avenicci brought in Grok, an Orc smith, to handle the heavy Orcish steel work at Warmaiden's forge. She handles the fine Nord craftsmanship, he handles what needs a heavier hammer. Ulfberth manages the shop floor and keeps them both supplied."
      condition_expr: "decnpc(actorUUID).name == \"Adrianne Avenicci\" or decnpc(actorUUID).name == \"Ulfberth War-Bear\""
      always_inject: false
      importance: 0.7
      type: "RELATIONSHIP"
      tags: ["Grok", "Adrianne", "Ulfberth", "Warmaiden", "blacksmith", "partnership"]
      location: "Whiterun"
      emotion: ""
    - display_name: "Grok - Orc Stronghold Rumors"
      content: "Word among the Orc strongholds is that Grok left his stronghold after a dispute with the chief over trading with outsiders. Some say he disgraced himself. Others say the chief was a fool to let a forge-master go."
      condition_expr: "decnpc(actorUUID).race == \"Orc\""
      always_inject: false
      importance: 0.6
      type: "KNOWLEDGE"
      tags: ["Grok", "Orc", "stronghold", "blacksmith"]
      location: ""
      emotion: ""
