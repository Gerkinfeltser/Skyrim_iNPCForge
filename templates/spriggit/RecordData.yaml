# ============================================================
# Spriggit RecordData — Mod Header Template
# ============================================================
# This file defines the plugin header. The agent fills in
# the actual plugin name.
#
# ESL FLAGGING:
#   Set automatically via ModHeader.Flags: [0x200] below.
#   FormIDs must be in the 0x000-0xFFF range (ESL constraint).
#   The MVP allocation (0x800+) satisfies this.
# ============================================================

SpriggitSource:
  PackageName: Spriggit.Yaml.Skyrim
  Version: 0.40.0
ModKey: Grok_iNPC.esp
GameRelease: SkyrimSE
ModHeader:
  Flags:
  - 0x200                             # ESL flag — light plugin (light plugins don't count against 255 limit)
  Author: Generated via iNPCForge
  MasterReferences:
  - Master: Skyrim.esm
    FileSize: 0
  - Master: Update.esm
    FileSize: 0
  INTV: 1

# ============================================================
# ESL FLAG:
#   The 0x200 flag in ModHeader.Flags sets the ESL bit in the
#   TES4 record header at creation time. No xEdit step needed.
#   Requires FormIDs in the 0x000-0xFFF range (ESL constraint).
# ============================================================

# ============================================================
# MASTERS:
#   Only include masters that records in this plugin actually reference.
#   MVP plugins reference Skyrim.esm (races, items, factions, packages).
#   Update.esm is sometimes needed — include it to be safe.
#   Do NOT include DLC masters unless records reference them.
# ============================================================
