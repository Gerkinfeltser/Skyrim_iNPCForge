# ============================================================
# Spriggit NPC Record — Reference Template
# ============================================================
# This is a REFERENCE for the agent, not a render template.
# The agent generates actual Spriggit YAML based on this format.
# Field names match Mutagen/Spriggit 0.40.0 conventions exactly,
# verified against real plugin serializations.
#
# File location in generated plugin:
#   {PluginName}_spriggit/Npcs/{editor_id} - {formID}_{plugin}.esp.yaml
# ============================================================

# FormKey: {record_id}:{plugin_name}.esp
# For ESL MVP: record_id is 0x800
FormKey: 000800:GrokTheSmith.esp
IsCompressed: True
MajorRecordFlagsRaw: 262144
EditorID: CustomNPC_Grok
SkyrimMajorRecordFlags:
- Compressed
ObjectBounds:
  First: -22, -14, 0
  Second: 22, 14, 128

# === Configuration (ACBS in CK) ===
Configuration:
  # Add - Female to flags when npc.config.yaml sex == "female"
  Flags:
  - AutoCalcStats
  # Add conditionally based on npc.config.yaml:
  # - Unique          → for named NPCs (set when combat_attitude != hostile or respawn: false)
  # - Respawn         → for respawning mooks (set when respawn: true)
  # - Essential       → for plot-critical NPCs (rare in MVP)
  # - Protected       → can only be killed by player (good middle ground for followers)
  Level:
    # For fixed level:
    MutagenObjectType: NpcLevel
    Level: 25
    # OR for PC-scaled:
    # MutagenObjectType: PcLevelMult
    # LevelMult: 1
  SpeedMultiplier: 100
  DispositionBase: 35

# === Factions (SNAM in CK) ===
# Optional — from npc.config.yaml factions list
# Hostile NPCs should include: BanditFaction (0x0001BCC0)
Factions:
- Faction: 028172:Skyrim.esm       # TownWhiterunFaction (verified: Ulfberth refId 000D15B0)
  Rank: 0
  Fluff: 0x000000

# === Race and Voice ===
Race: 013747:Skyrim.esm             # OrcRace → data/races.yaml
Voice: 02EDD6:Skyrim.esm            # MaleOrc → data/voices.yaml

# === Combat Class (CLASS) ===
# Common options:
#   017008:Skyrim.esm = Warrior (most melee NPCs)
#   01327B:Skyrim.esm = Thief (rogue/sneak NPCs)
#   01327D:Skyrim.esm = Mage (spellcasters)
Class: 017008:Skyrim.esm

# === AI Data (AIDT in CK) ===
# Aggression mapping (from combat_attitude):
#   friendly  → omit Aggression (defaults to Unaggressive)
#   neutral   → Aggression: Aggressive
#   hostile   → Aggression: Frenzied
# Confidence mapping:
#   friendly  → Confidence: Average
#   hostile   → Confidence: Foolhardy
AIData:
  Aggression: Unaggressive
  Confidence: Average
  EnergyLevel: 50
  Assistance: HelpsFriendsAndAllies
  Responsibility: NoCrime
  Unused: 119

# === Name ===
Name:
  TargetLanguage: English
  Value: Grok

# === Outfit (DefaultOutfit) ===
# Option A: vanilla reference → use FormKey from data/outfits.yaml
DefaultOutfit: 03BE07:Skyrim.esm    # OrcishArmor
# Option B: custom OTFT in plugin → reference the custom outfit's FormKey
# DefaultOutfit: 000802:GrokTheSmith.esp

# === AI Packages (PKFC) ===
# Sandbox only for friendly NPCs. Reference DefaultSandboxEditorLink.
# Hostile NPCs: omit this section entirely.
Packages:
- 0BAD0A:Skyrim.esm                 # DefaultSandboxEditorLink

# === Inventory (CNTO in CK) ===
# Optional — direct items carried by the NPC
Items:
- Item:
    Item: 013980:Skyrim.esm         # OrcishWarAxe
    Count: 1
- Item:
    Item: 00000F:Skyrim.esm         # Gold001
    Count: 50

# === Skills (PlayerSkills) ===
