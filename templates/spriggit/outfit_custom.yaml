# ============================================================
# Spriggit Outfit Record (OTFT) — Reference Template
# ============================================================
# Used when npc-yaml/{Name}_iNPC.yaml has outfit_items instead of outfit.
# The agent generates one of these records in the plugin, then
# references it from the NPC's DefaultOutfit field.
#
# File location in generated plugin:
#   {Name}_iNPC_spriggit/Outfits/{editor_id}_Outfit - {formID}_{plugin}.esp.yaml
#
# FormKey: uses a new FormID in this plugin (e.g. 0x802 for OTFT)
# The NPC's DefaultOutfit field references this FormKey.
#
# ============================================================
# FORMID REFERENCE — VERIFIED via xEdit (2026-06-13)
# ============================================================
# All FormIDs below dumped from Skyrim.esm ARMO records.
# EditorIDs use the real Skyrim naming convention (Armor*/Clothes*).
# Do NOT use friendly bare names like "OrcishCuirass" — the game
# EditorID is "ArmorOrcishCuirass".
# ============================================================

FormKey: 000802:Grok_iNPC.esp
EditorID: Grok_iNPC_Outfit

# Items: list of armor/clothing FormKeys from Skyrim.esm
# Resolve item EditorIDs to FormKeys using the reference below.
Items:
- 013957:Skyrim.esm    # ArmorOrcishCuirass
- 013956:Skyrim.esm    # ArmorOrcishBoots
- 013958:Skyrim.esm    # ArmorOrcishGauntlets
- 05B69F:Skyrim.esm    # ClothesBlackSmith (Blacksmith's Apron)

