# Vanilla Skyrim Voice Types
# Map of friendly name → FormID (Skyrim.esm)
# Use the EditorID (left side) in npc.config.yaml
#
# IMPORTANT: Always reference vanilla voice types directly.
# Do NOT dupe/create new VTYP records — SkyrimNet TTS maps by voice type FormID.
# A duped FormID will result in silent NPCs or fallback TTS.
#
# FormIDs are in the 02EDDx range for male voices and approximately
# 02EDEx–02EDEy for female voices in Skyrim.esm.
# VERIFY ALL FormIDs in xEdit before production use:
#   1. Open xEdit (SSEEdit)
#   2. Expand Skyrim.esm → Voice Type
#   3. Find the voice type by EditorID
#   4. Copy the FormID

voice_types:
  # === Male Voices ===
  # FormIDs in the 02EDD4–02EDE2 range (confirmed from serialization)
  MaleNord: "02EDD4:Skyrim.esm"
  MaleDarkElf: "02EDD5:Skyrim.esm"
