# Vanilla Skyrim Voice Types
# Map of EditorID -> FormKey (Skyrim.esm)
# Use the EditorID (left side) in npc-yaml/{Name}_iNPC.yaml
#
# SCOPE: Vanilla Skyrim.esm ONLY.
#   Dawnguard.esm, Dragonborn.esm, and Hearthfires.esm voice types are NOT
#   included. Some DLC unique voices (e.g. Serana, Miraak) exist but are out
#   of MVP scope. To add DLC coverage, run dump_voices.pas against each
#   DLC master and append the results here.
#
# VERIFIED via xEdit script dump against Skyrim.esm (2026-06-13).
# All FormIDs confirmed against live records.
#
# IMPORTANT: Always reference vanilla voice types directly.
# Do NOT dupe/create new VTYP records -- SkyrimNet TTS maps by voice type FormID.
# A duped FormID will result in silent NPCs or fallback TTS.
#
# RACE-SPECIFIC VOICES:
#   Only Nord, Orc, Khajiit, Argonian, DarkElf, and ElfHaughty have
#   race-specific voice types. Imperials, Bretons, Redguards, High Elves,
#   and Wood Elves do NOT -- they use the generic voices below (EvenToned,
#   Commoner, Commander, etc.). Pick a generic that fits the personality.

voice_types:
  # === Race-Specific Male Voices ===
  MaleNord: "013AE6:Skyrim.esm"
  MaleOrc: "013AEA:Skyrim.esm"
  MaleKhajiit: "013AEC:Skyrim.esm"
  MaleArgonian: "013AEE:Skyrim.esm"
