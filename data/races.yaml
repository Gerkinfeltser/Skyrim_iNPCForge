# Vanilla Skyrim Races
# Map of EditorID → FormKey (Skyrim.esm)
# Use the EditorID (left side) in npc-yaml/{Name}_iNPC.yaml
#
# SCOPE: Vanilla Skyrim.esm ONLY.
#   DLC races (e.g. werebear from Dawnguard, rieklings from Dragonborn) are
#   NOT included. To add DLC coverage, run dump_races.pas against each DLC
#   master and append results here.
#
# VERIFIED via xEdit script dump against Skyrim.esm (2026-06-13).
# All FormIDs confirmed against live RACE records.
#
# NOTE: Race EditorIDs in Skyrim.esm are alphabetical by race name within
# each block (Argonian, Breton, DarkElf, HighElf, Imperial, Khajiit, Nord,
# Orc, Redguard, WoodElf). Do not assume they follow any other order.

